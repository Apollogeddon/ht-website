name: Index

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testing:
    uses: apollogeddon/forgejs/.github/workflows/testing.yml@v2.0.3
    with:
      node_version: '22'
      working_directory: '.'
    permissions:
      contents: read
      pull-requests: write
      packages: read

  deploy:
    needs: testing
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: apollogeddon/forgejs/.github/workflows/website.yml@v2.0.3
    with:
      artifact_name: 'dist'
    permissions:
      contents: write
      pull-requests: write
      pages: write
      id-token: write

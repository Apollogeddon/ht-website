name: Index

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testing:
    uses: apollogeddon/forgejs/.github/workflows/testing.yml@v2.3.2
    with:
      node_version: '22'
      working_directory: '.'
      build_env_vars: "PUBLIC_WEB3FORMS_ACCESS_KEY=${{ vars.PUBLIC_WEB3FORMS_ACCESS_KEY }}"
    permissions:
      contents: write
      pull-requests: write
      packages: read

  deploy:
    needs: testing
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: apollogeddon/forgejs/.github/workflows/website.yml@v2.3.2
    with:
      artifact_name: 'dist'
    permissions:
      contents: write
      pull-requests: write
      pages: write
      id-token: write

  validate:
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Validate live site
        run: curl -f --retry 5 --retry-delay 10 --retry-connrefused https://ht.apollogeddon.com
